command:
  - "sh"
  - "-c"
  - >-
    npm install --legacy-peer-deps &&
    sed -i 's|import { nodeFileTrace } from "@vercel/nft";|import _nft from "@vercel/nft"; const { nodeFileTrace } = _nft;|g'
    node_modules/nf3/dist/_chunks/trace.mjs 2>/dev/null || true &&
    NITRO_PRESET=node-server npm run build &&
    node .output/server/index.mjs

env:
  - name: PGHOST
    value: "ep-summer-silence-eenujnkm.database.westus2.azuredatabricks.net"
  - name: PGDATABASE
    value: "databricks_postgres"
  - name: PGPORT
    value: "5432"
  - name: LAKEBASE_ENDPOINT
    value: "projects/horizon-ai-innovation/branches/production/endpoints/primary"
